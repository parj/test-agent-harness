services:
  postgres:
    image: dhi.io/pgvector:0.8-pg18
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: finops
      POSTGRES_USER: finops
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
